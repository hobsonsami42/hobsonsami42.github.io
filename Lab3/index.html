<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 3: Sign Up Page</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-7">
                <div class="card shadow border-0">
                    <div class="card-header text center bg-primary text-white fw-semibold">
                        CST336 Lab 3
                    </div>
                    <div class="card-body p-4">
                        <h1 class="text-center mb-4">📝 Sign Up</h1>
                        <p class="text-center text-muted mb-4">Create your CST336 account!</p>

                        <form id="signupForm" action="welcome.html">
                            <div class="mb-3">
                                <label for="fName" class="form-label">First Name</label>
                                <input type="text" id="fName" name="fName" class="form-control" placeholder="Enter first name">
                            </div>

                            <div class="mb-3">
                                <label for="lName" class="form-label">Last Name</label>
                                <input type="text" id="lName" name="lName" class="form-control" placeholder="Enter last name">
                            </div>

                            <div class="mb-3">
                                <label class="form-label d-block">Gender</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="male" value="m">
                                    <label class="form-check-label" for="male">Male</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="female" value="f">
                                    <label class="form-check-label" for="female">Female</label>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="zip" class="form-label">Zip Code</label>
                                <input type="text" id="zip" name="zip" class="form-control">
                                <div id="zipError" class="mt-1 fw-bold"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">City</label>
                                <div id="city" class="form-control bg-body-secondary"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Latitude</label>
                                <div id="latitude" class="form-control bg-body-secondary"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Longitude</label>
                                <div id="longitude" class="form-control bg-body-secondary"></div>
                            </div>

                            <div class="mb-3">
                                <label for="state" class="form-label">State</label>
                                <select id="state" name="state" class="form-select">
                                    <option value="">Loading states...</option>
                                </select>
                            </div>

                                <div class="mb-3">
                                    <label for="county" class="form-label">County</label>
                                    <select id="county" name="county" class="form-select">
                                        <option value="">Select a state first</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="username" class="form-label">Desired Username</label>
                                    <input type="text" id="username" class="form-control">
                                    <div id="usernameError" class="mt-1 fw-bold"></div>
                                </div>

                                <div class="mb-3">
                                    <label for="password" class="form-label">Password</label>
                                    <input type="password" id="password" name="password" class="form-control">
                                    <div id="suggestedPwd" class="mt-1 text-primary fw-bold"></div>
                                </div>

                                <div class="mb-3">
                                    <label for="passwordAgain" class="form-label">Type Password Again</label>
                                    <input type="password" id="passwordAgain" name="passwordAgain" class="form-control">
                                </div>
                                <div id="passwordError" class="mb-3 fw-bold text-danger"></div>

                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary btn-lg">Sign Up!</button>
                                </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="text-center mt-3 text-muted small">
        CST336 Internet Programming. 2026&copy; Hobson <br>
    </footer>
    <script src="js/script.js"></script>

</body>
</html>
